esphome:
  name: matter-fan-controller
  friendly_name: Matter Fan Controller

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/tomschimansky/esphome-matter.git



# Enable OpenThread
openthread:
  device_type: MTD # Keep as Minimal Thread Device for stability

# Enable Matter
matter:

# Configure the PWM output on GPIO21 (Physical Pin D3) at 25kHz
output:
  - platform: ledc
    pin: GPIO21
    frequency: 25000 Hz
    id: fan_pwm

# Expose the PWM output as a Fan component
fan:
  - platform: speed
    output: fan_pwm
    name: "Noctua Fan"
    speed_count: 100

# Configure the Physical Button on GPIO2 (Physical Pin D2)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLDOWN
    name: "Fan Toggle Button"
    on_press:
      - fan.toggle: "Noctua Fan"
