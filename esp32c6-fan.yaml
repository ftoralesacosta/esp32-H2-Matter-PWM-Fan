esphome:
  name: matter-fan-controller
  friendly_name: Matter Fan Controller

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# OpenThread requires IPv6 to be enabled in the network component
network:
  enable_ipv6: true


# Enable the native ESPHome API for Home Assistant
api:

# Enable Over-The-Air updates
ota:
  - platform: esphome

# Enable OpenThread
openthread:
  device_type: MTD # Keep as Minimal Thread Device for stability
  # Replace the dummy TLV below with your actual Thread Dataset TLV from Home Assistant
  tlv: "0e080000000000010000000300001335060004001fffe0020811111111222222220708fd53145fed22ad810510dfd34f0f05cad978ec4e32b0413038ff030e4f70656e5468726561642d3866323801028f280410d63e8e3e495ebbc3c23a76e98f1a64830c040200f7f8"


# Configure the PWM output on GPIO21 (Physical Pin D3) at 25kHz
output:
  - platform: ledc
    pin: GPIO21
    frequency: 25000 Hz
    id: fan_pwm

# Expose the PWM output as a Fan component
fan:
  - platform: speed
    output: fan_pwm
    name: "Noctua Fan"
    id: noctua_fan
    speed_count: 100

# Configure the Physical Button on GPIO2 (Physical Pin D2)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLDOWN
    name: "Fan Toggle Button"
    on_press:
      - fan.toggle: noctua_fan

